# PubMed watch queries for LigaSys.
# bucket: "research" (internal / mechanisms + epi) or "fieldnotes" (blog-worthy)
# Edit freely — the fetch script reads this file, nothing is hardcoded.
#
# Revision note (2026-07-20): the three hormone queries
# (menstrual-cycle-injury, sex-hormones-connective-tissue, contraception-msk-injury)
# were pulling heavy oncology/dental/gynecology bycatch because they matched
# hormone + connective-tissue/injury terms with no sports or orthopedic gate.
# Each now (a) REQUIRES an athletic OR lower-limb orthopedic-injury context and
# (b) excludes the recurring bycatch domains (cancer, dental/periodontal, uterine).
# The core orthopedic queries are unchanged except a light shared exclusion where
# useful.

- id: ankle-instability-mechanism
  bucket: research
  label: Chronic ankle instability — mechanisms
  term: >
    ("chronic ankle instability"[Title/Abstract] OR "functional ankle instability"[Title/Abstract]
    OR "mechanical ankle instability"[Title/Abstract])
    AND (mechanism*[Title/Abstract] OR kinematic*[Title/Abstract] OR propriocept*[Title/Abstract]
    OR "neuromuscular control"[Title/Abstract])

- id: lateral-sprain-epi
  bucket: research
  label: Lateral ankle sprain — epidemiology & incidence
  term: >
    ("ankle sprain"[Title/Abstract] OR "lateral ligament injury"[Title/Abstract])
    AND (epidemiolog*[Title/Abstract] OR incidence[Title/Abstract] OR "injury surveillance"[Title/Abstract]
    OR prevalence[Title/Abstract]) AND (athlet*[Title/Abstract] OR sport*[Title/Abstract])

- id: inversion-kinematics
  bucket: research
  label: Inversion injury kinematics & load paths
  term: >
    (inversion[Title/Abstract] AND (ankle[Title/Abstract] OR subtalar[Title/Abstract]))
    AND (kinematic*[Title/Abstract] OR biomechanic*[Title/Abstract] OR "moment arm"[Title/Abstract]
    OR "joint moment"[Title/Abstract] OR "ground reaction force"[Title/Abstract])

- id: bracing-orthosis-efficacy
  bucket: research
  label: Bracing / orthosis efficacy & performance cost
  term: >
    (brace[Title/Abstract] OR bracing[Title/Abstract] OR orthos*[Title/Abstract] OR taping[Title/Abstract])
    AND ankle[Title/Abstract]
    AND (efficacy[Title/Abstract] OR prevention[Title/Abstract] OR "performance"[Title/Abstract]
    OR "range of motion"[Title/Abstract] OR compliance[Title/Abstract])
    NOT (stroke[Title/Abstract] OR "cerebral palsy"[Title/Abstract] OR "spinal cord"[Title/Abstract]
    OR "foot drop"[Title/Abstract] OR "cardio-ankle"[Title/Abstract] OR "pulse wave"[Title/Abstract]
    OR "arterial stiffness"[Title/Abstract])

- id: footwear-interface
  bucket: research
  label: Footwear / shoe-surface interface & traction
  term: >
    (footwear[Title/Abstract] OR shoe[Title/Abstract] OR cleat*[Title/Abstract] OR "stud design"[Title/Abstract])
    AND (traction[Title/Abstract] OR "rotational stiffness"[Title/Abstract] OR "shoe-surface"[Title/Abstract]
    OR "playing surface"[Title/Abstract] OR friction[Title/Abstract])
    AND (injur*[Title/Abstract] OR biomechanic*[Title/Abstract])

- id: wearable-prevention
  bucket: fieldnotes
  label: Wearables & sensors for injury prevention
  term: >
    (wearable*[Title/Abstract] OR "inertial measurement unit"[Title/Abstract] OR IMU[Title/Abstract]
    OR "smart textile"[Title/Abstract] OR exosuit[Title/Abstract] OR "soft robotic"[Title/Abstract])
    AND (injur*[Title/Abstract] OR prevention[Title/Abstract] OR "load monitoring"[Title/Abstract])
    AND (sport*[Title/Abstract] OR athlet*[Title/Abstract] OR gait[Title/Abstract])
    NOT (stroke[Title/Abstract] OR "cerebral palsy"[Title/Abstract] OR "spinal cord"[Title/Abstract]
    OR Parkinson*[Title/Abstract] OR depress*[Title/Abstract] OR "brain-computer"[Title/Abstract])

- id: actuation-assistive
  bucket: fieldnotes
  label: Ankle actuation / assistive devices
  term: >
    (ankle[Title/Abstract] AND (exoskeleton[Title/Abstract] OR actuat*[Title/Abstract]
    OR "variable stiffness"[Title/Abstract] OR "semi-active"[Title/Abstract] OR "quasi-passive"[Title/Abstract]))

- id: return-to-play
  bucket: fieldnotes
  label: Return-to-play & reinjury risk
  term: >
    ("return to play"[Title/Abstract] OR "return to sport"[Title/Abstract] OR reinjur*[Title/Abstract]
    OR "re-injury"[Title/Abstract]) AND (ankle[Title/Abstract] OR "lower extremity"[Title/Abstract])

- id: burden-cost
  bucket: fieldnotes
  label: Injury burden, cost & time loss
  term: >
    (ankle[Title/Abstract] OR "lower limb"[Title/Abstract]) AND injur*[Title/Abstract]
    AND (cost[Title/Abstract] OR burden[Title/Abstract] OR "time loss"[Title/Abstract]
    OR "economic"[Title/Abstract] OR "days missed"[Title/Abstract])
    NOT (thrombos*[Title/Abstract] OR "venous thromboembolism"[Title/Abstract] OR diabet*[Title/Abstract]
    OR Hajj[Title/Abstract] OR heatstroke[Title/Abstract])

# ---------------------------------------------------------------------------
# Female-athlete hormonal layer.
# All three now REQUIRE a sports/athletic OR lower-limb orthopedic-injury context,
# and exclude the oncology / dental / uterine / cardiovascular domains that
# dominated the 2026-07-20 bycatch. The intent is: hormonal & cycle effects
# AS AN ADDITIONAL LAYER on orthopedic sports-injury risk — not endocrinology
# or hormone biology in general.
# ---------------------------------------------------------------------------

- id: menstrual-cycle-injury
  bucket: fieldnotes
  label: Menstrual cycle / hormonal phase & injury risk (sports)
  term: >
    ("menstrual cycle"[Title/Abstract] OR "menstrual phase"[Title/Abstract]
    OR "hormonal contraception"[Title/Abstract] OR "oral contraceptive*"[Title/Abstract]
    OR "hormonal fluctuation"[Title/Abstract] OR "hormonal phase"[Title/Abstract])
    AND ("ligament laxity"[Title/Abstract] OR "joint laxity"[Title/Abstract]
    OR "ankle sprain"[Title/Abstract] OR sprain[Title/Abstract] OR ACL[Title/Abstract]
    OR "anterior cruciate"[Title/Abstract] OR "lower limb injur*"[Title/Abstract]
    OR "lower extremity injur*"[Title/Abstract] OR "musculoskeletal injur*"[Title/Abstract])
    AND ("female athlete*"[Title/Abstract] OR athlet*[Title/Abstract] OR sport*[Title/Abstract])
    NOT (cancer[Title/Abstract] OR carcinom*[Title/Abstract] OR tumou*[Title/Abstract]
    OR tumor*[Title/Abstract] OR endometri*[Title/Abstract] OR adenomyos*[Title/Abstract]
    OR uter*[Title/Abstract] OR menopaus*[Title/Abstract] OR "dental"[Title/Abstract]
    OR periodont*[Title/Abstract] OR implant[Title/Abstract] OR cardiac[Title/Abstract]
    OR myocardial[Title/Abstract])

- id: sex-hormones-connective-tissue
  bucket: fieldnotes
  label: Sex hormones & connective tissue (orthopedic / athletic)
  term: >
    (estrogen[Title/Abstract] OR oestrogen[Title/Abstract] OR progesterone[Title/Abstract]
    OR relaxin[Title/Abstract] OR "estrogen receptor"[Title/Abstract])
    AND (ligament[Title/Abstract] OR tendon[Title/Abstract] OR "connective tissue"[Title/Abstract]
    OR "collagen"[Title/Abstract])
    AND ("ligament laxity"[Title/Abstract] OR "joint laxity"[Title/Abstract]
    OR injur*[Title/Abstract] OR sprain[Title/Abstract] OR ACL[Title/Abstract]
    OR "anterior cruciate"[Title/Abstract] OR biomechanic*[Title/Abstract]
    OR "mechanical propert*"[Title/Abstract] OR "range of motion"[Title/Abstract])
    AND (athlet*[Title/Abstract] OR sport*[Title/Abstract] OR exercise[Title/Abstract]
    OR "physical activity"[Title/Abstract] OR knee[Title/Abstract] OR ankle[Title/Abstract]
    OR "lower limb"[Title/Abstract] OR "lower extremity"[Title/Abstract])
    NOT (cancer[Title/Abstract] OR carcinom*[Title/Abstract] OR tumou*[Title/Abstract]
    OR tumor*[Title/Abstract] OR raloxifen*[Title/Abstract] OR letrozol*[Title/Abstract]
    OR aromatase[Title/Abstract] OR prostat*[Title/Abstract] OR breast[Title/Abstract]
    OR endometri*[Title/Abstract] OR adenomyos*[Title/Abstract] OR uter*[Title/Abstract]
    OR "intrauterine"[Title/Abstract] OR dental[Title/Abstract] OR periodont*[Title/Abstract]
    OR "dental implant"[Title/Abstract] OR pulmonary[Title/Abstract] OR fibrosis[Title/Abstract]
    OR skin[Title/Abstract] OR cardiac[Title/Abstract] OR myocardial[Title/Abstract]
    OR ovariectom*[Title/Abstract])

- id: contraception-msk-injury
  bucket: fieldnotes
  label: Hormonal contraception & MSK injury (sports)
  term: >
    ("oral contraceptive*"[Title/Abstract] OR "hormonal contraception"[Title/Abstract]
    OR "combined oral contraceptive*"[Title/Abstract])
    AND (ligament[Title/Abstract] OR tendon[Title/Abstract] OR "musculoskeletal injur*"[Title/Abstract]
    OR ACL[Title/Abstract] OR "anterior cruciate"[Title/Abstract] OR sprain[Title/Abstract]
    OR "joint laxity"[Title/Abstract] OR "ligament laxity"[Title/Abstract])
    AND (athlet*[Title/Abstract] OR sport*[Title/Abstract] OR "physical activity"[Title/Abstract]
    OR exercise[Title/Abstract])
    NOT (cancer[Title/Abstract] OR carcinom*[Title/Abstract] OR thrombos*[Title/Abstract]
    OR "venous thromboembolism"[Title/Abstract] OR embolism[Title/Abstract]
    OR cardiac[Title/Abstract] OR myocardial[Title/Abstract] OR stroke[Title/Abstract]
    OR endometri*[Title/Abstract] OR uter*[Title/Abstract] OR fibroid*[Title/Abstract])

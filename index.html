<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LigaSys — PubMed Watch</title>
<link rel="alternate" type="application/atom+xml" title="PubMed Watch — all" href="data/feed.xml">
<link rel="alternate" type="application/atom+xml" title="PubMed Watch — research" href="data/feed-research.xml">
<link rel="alternate" type="application/atom+xml" title="PubMed Watch — field notes" href="data/feed-fieldnotes.xml">
<style>
  :root {
    --bg: #0f1113; --panel: #171a1d; --line: #262b30;
    --ink: #e8eaed; --dim: #9aa3ab; --faint: #6b747c;
    --res: #4a9eff; --fn: #f0a03c; --new: #3ddc84;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#fbfbfa; --panel:#fff; --line:#e3e5e8; --ink:#1a1d21;
            --dim:#5c656e; --faint:#8b949c; --res:#0b62d0; --fn:#b06800; --new:#0a8a44; }
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif; }
  header { padding:28px 24px 18px; border-bottom:1px solid var(--line); }
  h1 { margin:0; font-size:19px; letter-spacing:-.01em; font-weight:650; }
  .meta { color:var(--faint); font-size:12.5px; margin-top:5px; }
  .wrap { max-width:900px; margin:0 auto; }
  .bar { display:flex; gap:7px; flex-wrap:wrap; padding:16px 24px;
         border-bottom:1px solid var(--line); align-items:center; }
  button.f { background:transparent; border:1px solid var(--line); color:var(--dim);
             padding:5px 11px; border-radius:20px; font-size:12.5px; cursor:pointer;
             font-family:inherit; }
  button.f:hover { border-color:var(--faint); color:var(--ink); }
  button.f[aria-pressed="true"] { background:var(--ink); color:var(--bg);
                                  border-color:var(--ink); font-weight:550; }
  #q { flex:1; min-width:150px; background:var(--panel); border:1px solid var(--line);
       color:var(--ink); padding:6px 11px; border-radius:6px; font-size:13px;
       font-family:inherit; }
  main { padding:8px 24px 60px; }
  article { border-bottom:1px solid var(--line); padding:17px 0; }
  .t { font-size:15px; font-weight:560; line-height:1.4; margin:0 0 5px;
       letter-spacing:-.005em; }
  .t a { color:inherit; text-decoration:none; }
  .t a:hover { text-decoration:underline; text-underline-offset:2px; }
  .cite { color:var(--dim); font-size:12.5px; margin-bottom:8px; }
  .tags { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:7px; }
  .tag { font-size:10.5px; padding:2px 7px; border-radius:3px; border:1px solid;
         letter-spacing:.02em; }
  .tag.research { color:var(--res); border-color:var(--res); }
  .tag.fieldnotes { color:var(--fn); border-color:var(--fn); }
  .tag.new { color:var(--new); border-color:var(--new); font-weight:650; }
  .abs { color:var(--dim); font-size:13.5px; margin:0; }
  .abs.clip { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
              overflow:hidden; }
  .more { background:none; border:none; color:var(--faint); font-size:12px;
          cursor:pointer; padding:3px 0; font-family:inherit; }
  .more:hover { color:var(--ink); }
  .empty { color:var(--faint); text-align:center; padding:70px 20px; font-size:14px; }
  .banner { background:var(--panel); border:1px solid var(--line); border-radius:7px;
            padding:11px 14px; margin:16px 0 0; color:var(--dim); font-size:12.5px; }
  code { background:var(--panel); padding:1px 5px; border-radius:3px; font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>LigaSys — PubMed Watch</h1>
    <div class="meta" id="meta">Loading…</div>
    <div class="banner" id="banner" hidden></div>
    <div class="meta" style="margin-top:8px">
      Feeds:
      <a href="data/feed.xml" style="color:var(--res)">all</a> ·
      <a href="data/feed-research.xml" style="color:var(--res)">research</a> ·
      <a href="data/feed-fieldnotes.xml" style="color:var(--res)">field notes</a>
    </div>
  </header>
  <div class="bar" id="bar" hidden>
    <button class="f" data-b="all" aria-pressed="true">All</button>
    <button class="f" data-b="new">New</button>
    <button class="f" data-b="research">Research</button>
    <button class="f" data-b="fieldnotes">Field Notes</button>
    <input id="q" placeholder="Filter by title, journal, abstract…">
  </div>
  <main id="out"><div class="empty">Loading…</div></main>
</div>
<script>
const esc = s => String(s ?? "").replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
let DATA = null, bucket = "all", term = "";

function visible() {
  if (!DATA) return [];
  return DATA.records.filter(r => {
    if (bucket === "new" && !r.is_new) return false;
    if (bucket === "research" && r.bucket !== "research") return false;
    if (bucket === "fieldnotes" && r.bucket !== "fieldnotes") return false;
    if (!term) return true;
    const t = term.toLowerCase();
    return (r.title + " " + r.journal + " " + r.abstract + " " +
            r.authors.join(" ")).toLowerCase().includes(t);
  });
}

function render() {
  const rs = visible(), out = document.getElementById("out");
  if (!rs.length) {
    out.innerHTML = '<div class="empty">Nothing matches this filter.</div>';
    return;
  }
  out.innerHTML = rs.map(r => {
    const tags = [
      r.is_new ? '<span class="tag new">NEW</span>' : "",
      ...r.matched.map(m =>
        `<span class="tag ${m.bucket}">${esc(m.label)}</span>`)
    ].join("");
    const cite = [r.authors.join(", "), r.journal, r.year]
      .filter(Boolean).map(esc).join(" · ");
    const doi = r.doi
      ? ` · <a href="https://doi.org/${esc(r.doi)}" target="_blank"
             rel="noopener" style="color:var(--faint)">doi</a>` : "";
    const abs = r.abstract
      ? `<p class="abs clip">${esc(r.abstract)}</p>
         <button class="more">Show abstract</button>`
      : '<p class="abs" style="color:var(--faint)">No abstract indexed.</p>';
    return `<article>
      <div class="tags">${tags}</div>
      <p class="t"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title)}</a></p>
      <div class="cite">${cite}${doi}</div>
      ${abs}
    </article>`;
  }).join("");

  out.querySelectorAll(".more").forEach(b => b.onclick = () => {
    const p = b.previousElementSibling;
    p.classList.toggle("clip");
    b.textContent = p.classList.contains("clip") ? "Show abstract" : "Hide abstract";
  });
}

fetch("data/results.json?t=" + Date.now())
  .then(r => { if (!r.ok) throw new Error("results.json missing (HTTP " + r.status + ")"); return r.json(); })
  .then(d => {
    DATA = d;
    const when = new Date(d.generated);
    const c = d.counts;
    document.getElementById("meta").textContent =
      `${c.total} papers indexed in the last ${d.lookback_days} days · ` +
      `${c.new} new · ${c.research} research · ${c.fieldnotes} field notes · ` +
      `swept ${when.toLocaleString()}`;
    if (d.first_run) {
      const b = document.getElementById("banner");
      b.hidden = false;
      b.textContent = "First run — baseline established. Everything here is marked " +
        "seen; subsequent sweeps will flag genuinely new papers.";
    }
    document.getElementById("bar").hidden = false;
    render();
  })
  .catch(e => {
    document.getElementById("meta").textContent = "";
    document.getElementById("out").innerHTML =
      `<div class="empty">${esc(e.message)}<br><br>` +
      `Run <code>python fetch.py</code>, or wait for the first Action run.</div>`;
  });

document.getElementById("bar").addEventListener("click", e => {
  const b = e.target.closest("button.f");
  if (!b) return;
  document.querySelectorAll("button.f")
    .forEach(x => x.setAttribute("aria-pressed", x === b));
  bucket = b.dataset.b;
  render();
});
document.getElementById("q").addEventListener("input", e => {
  term = e.target.value.trim();
  render();
});
</script>
</body>
</html>
